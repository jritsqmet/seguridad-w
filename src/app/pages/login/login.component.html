<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4 p-md-5">
          <h2 class="text-center mb-4">Iniciar sesión</h2>
          
          <form (ngSubmit)="login(formulario)" #formulario="ngForm">

            <!-- Email -->
            <div class="mb-4">
              <label for="email" class="form-label fw-semibold">Correo electrónico</label>
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <i class="bi bi-envelope"></i>
                </span>
                <input 
                  type="email" 
                  class="form-control form-control-lg" 
                  name="email" 
                  [(ngModel)]="email"
                  placeholder="tucorreo@ejemplo.com"
                >
              </div>
            </div>

            <!-- Password -->
            <div class="mb-4">
              <label for="password" class="form-label fw-semibold">Contraseña</label>
              <div class="input-group">
                <span class="input-group-text bg-light">
                  <i class="bi bi-lock"></i>
                </span>
                <input 
                  type="password" 
                  class="form-control form-control-lg" 
                  name="password" 
                  [(ngModel)]="password"
                  placeholder="••••••••"
                >
              </div>
              <div class="text-end mt-2">
                <a href="#" class="text-decoration-none text-muted small">¿Olvidaste tu contraseña?</a>
              </div>
            </div>

            <!-- Submit Button -->
            <button 
              type="submit" 
              class="btn btn-primary w-100 py-2 fw-bold mb-3"
            >
              Iniciar sesión
            </button>

            <div class="text-center">
              <p class="text-muted mb-0">¿No tienes cuenta? 
                <a routerLink="/registro" class="text-decoration-none fw-semibold">Regístrate</a>
              </p>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
